syntax = "proto3";

package routeguide;

message Point {
  int32 latitude  = 1;
  int32 longitude = 2;
}

message Rectangle {
  Point lo = 1;
  Point hi = 2;
}

message Feature {
  string name     = 1;
  Point  location = 2;
}

service RouteGuide {
  //  Server-streaming: yield each Feature inside the rectangle.
  rpc ListFeatures (Rectangle) returns (stream Feature);
}

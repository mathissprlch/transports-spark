name: gnatprove

# Release-gate SPARK proof sweep at --level=4 (the full
# `make prove` target).  Runs every 12 h on main and on demand;
# kept off the per-PR critical path because a cold L4 sweep is
# 30+ min and the PR matrix already gates on AoRTE-relevant
# regressions through the interop / unit-test steps.
on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

concurrency:
  group: gnatprove-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  prove:
    name: gnatprove --level=4 (release sweep)
    runs-on: ubuntu-latest
    timeout-minutes: 240

    # schedule events fire on the default branch; this guard
    # makes workflow_dispatch behave the same way so an ad-hoc
    # kick from a feature branch doesn't spend 30+ min of CI
    # proving in-flight work.
    if: github.ref == 'refs/heads/main'

    env:
      DOCKER_IMAGE: transports-spark:prove

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build CI image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          tags: ${{ env.DOCKER_IMAGE }}
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: gnatprove --level=4 (make prove)
        run: docker run --rm ${{ env.DOCKER_IMAGE }} make prove

name: ci

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel superseded runs on the same branch so a fast follow-up
# commit doesn't queue behind a stale build.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  ci:
    name: Build image + run unit tests, interop, gnatprove smoke
    runs-on: ubuntu-latest
    timeout-minutes: 60

    # Persists across jobs and runs as long as the cache stays
    # under GitHub's eviction threshold (10 GB per repo, LRU).
    env:
      DOCKER_IMAGE: transports-spark:ci

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build via buildx with the GitHub Actions cache backend so
      # the BuildKit cache mounts (apt, Alire downloads, Alire
      # build cache, alr toolchain) survive between runs.  First
      # run is cold and slow; subsequent runs reuse most layers.
      - name: Build CI image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          tags: ${{ env.DOCKER_IMAGE }}
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Unit tests (tls_core, 598 asserts)
        run: docker run --rm ${{ env.DOCKER_IMAGE }} make tls-test

      # http2_core_tests / grpc_core_tests are built into the
      # image; run them directly so a regression in either is
      # surfaced as a distinct CI step.
      - name: Unit tests (http2_core)
        run: |
          docker run --rm ${{ env.DOCKER_IMAGE }} bash -c '
            if [ -x crates/http2_core_tests/bin/http2_core_tests ]; then
              crates/http2_core_tests/bin/http2_core_tests
            else
              echo "http2_core_tests not present — skipping"
            fi'

      - name: Unit tests (grpc_core)
        run: |
          docker run --rm ${{ env.DOCKER_IMAGE }} bash -c '
            if [ -x crates/grpc_core_tests/bin/grpc_core_tests ]; then
              crates/grpc_core_tests/bin/grpc_core_tests
            else
              echo "grpc_core_tests not present — skipping"
            fi'

      # Full Ada matrix against openssl / gnutls-cli / Go (the
      # peers shipped in the image).  Other peers (rustls / mbedtls
      # / BoringSSL / wolfSSL) report NI-3P automatically when
      # their binaries are missing — counted, not flagged.
      # Blocking: any FAIL (Ada bug) row breaks the build.
      - name: Interop matrix (full — Ada TLS 1.3 vs. openssl / gnutls / Go)
        id: interop
        run: |
          set -o pipefail
          docker run --rm --name=interop \
            -v "$PWD/interop-logs:/tmp/spark-tls-interop" \
            ${{ env.DOCKER_IMAGE }} make tls-interop \
            2>&1 | tee interop-output.txt

      # gnatprove smoke test — confirms the prover toolchain still
      # loads the workspace and runs.  --level=0 is single-prover
      # (cvc5 only) with a 1s per-VC timeout; --steps=1500 caps
      # deterministically so hard VCs bail well under 1s.  Tuned
      # for ~5-8 min wall time on the CI runner.  Exit code is
      # masked by the trailing `| tail -25` in the make target,
      # so this step is a smoke gate, not a proof gate; the
      # release-gate sweep at --level=4 runs on a nightly workflow.
      - name: gnatprove smoke (level=0, steps=1500)
        run: docker run --rm ${{ env.DOCKER_IMAGE }} make prove-quick PROVE_QUICK_LEVEL=0 PROVE_QUICK_FLAGS="--steps=1500"

      - name: Upload interop logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: interop-logs
          path: interop-logs/
          if-no-files-found: ignore
          retention-days: 14

      - name: Surface interop status
        if: failure() && steps.interop.outcome == 'failure'
        run: |
          echo "::warning::tls-interop reported failing cells — see uploaded interop-logs artifact."

      # On PR runs (where artifact downloads need auth), post the
      # matrix output as a PR comment so reviewers — and bots that
      # can read PR comments but not artifacts — see the failing
      # rows inline.  push-run failures still upload the artifact;
      # this step just adds a more accessible surface for PRs.
      - name: Comment matrix on PR (failure only)
        if: failure() && steps.interop.outcome == 'failure' && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          {
            echo "## Interop matrix — failing cells"
            echo
            echo "Commit: \`${{ github.sha }}\`"
            echo "Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo
            echo '<details><summary>Full matrix output (tail 50KB)</summary>'
            echo
            echo '```'
            tail -c 50000 interop-output.txt
            echo '```'
            echo
            echo '</details>'
          } > comment.md
          gh pr comment "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}" \
            --body-file comment.md
